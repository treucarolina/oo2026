<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="02_calculator.js"> </script>
    <script>
        let c1;

        function startPage(){
            c1=new CmToIn();

            const type1 = document.getElementById("type1");
            type1.innerText = c1.inputUnit();
            const type2 = document.getElementById("type2");
            type2.innerText = c1.outputUnit();

        }

        function buttonClick(){
            const input = document.getElementById("input1");
            const answer = document.getElementById("answer");
            const value = input.valueAsNumber;

            answer.innerText = c1.calculate(value).toFixed(2);
        }

    </script>
</head>
<body onload="startPage()">
    <input type="number" id="input1" onchange="buttonClick()">
    <!-- This is to display the input unit-->
    <span id="type1"></span>
    <input type="button" value="=" onclick="buttonClick()">
    <span id="answer"></span>
    <span id="type2"></span>
</body>
</html>
